<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentient Productions Logo Animation</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }

    body {
      display: grid;
      place-items: center;
    }

    .stage {
      width: min(70vh, 82vw);
      aspect-ratio: 1000 / 1400;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .stroke-path {
      fill: none;
      stroke: #fff;
      stroke-linecap: square;
      stroke-dasharray: 1 1;
      stroke-dashoffset: 1;
      animation: draw 1.4s cubic-bezier(.65, 0, .35, 1) forwards;
    }

    #path1 { stroke-width: 28; animation-delay: 0s; }
    #path2 { stroke-width: 22.5; animation-delay: .55s; }
    #path3 { stroke-width: 28; animation-delay: .95s; }
    #path5 { stroke-width: 28; animation-delay: 1.55s; }
    #path4 { stroke-width: 28; animation-delay: 1.85s; }

    .glow-group {
      animation: pulse 4s ease-in-out 2.6s infinite;
    }

    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulse {
      0%,
      100% { filter: drop-shadow(0 0 0 rgba(255, 255, 255, 0)); }
      50% { filter: drop-shadow(0 0 14px rgba(255, 255, 255, .55)); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stroke-path {
        stroke-dashoffset: 0;
        animation: none;
      }

      .glow-group {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <svg viewBox="0 0 1000 1400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sentient Productions symbol">
      <rect width="1000" height="1400" fill="#000" />
      <g class="glow-group" fill="none" stroke="#fff" stroke-linecap="square">
        <path id="path1" class="stroke-path" pathLength="1"
          d="M 862.11888,293.37748 420,290 c -66.27228,-0.50627 -119.99995,53.72583 -119.99995,120 0,66.27417 53.72574,120 119.99995,120 h 260.4901" />
        <path id="path2" class="stroke-path" pathLength="1"
          d="M 310.13243,678.98019 660.79458,903.50991" />
        <path id="path3" class="stroke-path" pathLength="1"
          d="M 481.69552,720 H 736 c 66.27421,0 119.99995,53.72583 119.99995,120 0,66.27417 -53.72574,120 -119.99995,120 H 508.45047" />
        <path id="path4" class="stroke-path" pathLength="1"
          d="m 488,960 v 280" />
        <path id="path5" class="stroke-path" pathLength="1"
          d="m 766,642 c 36.66667,10 71,22.66667 91,46" />
      </g>
    </svg>
  </div>
</body>
</html>
